  .header {
    background: linear-gradient(135deg, #1a1f2e, #0a0e14);
    padding: 60px 20px 30px; text-align: center;

  .header .badge {
    display: inline-block;

  .header h1 { font-size: 32px; font-weight: 900; letter-spacing: -0.5px; }

  .content { padding: 20px; max-width: 600px; margin: 0 auto; }

    margin: 0 0 12px; padding-left: 12px;
    border-left: 3px solid #ef4444;
    letter-spacing: 0.5px;
  }
  .restaurant-list { display: flex; flex-direction: column; gap: 12px; }
  .rest-card {
    background: #10141c; border: 1px solid rgba(255,255,255,.06);
    border-radius: 14px; padding: 16px;
    transition: all .2s;
  }
  .rest-card:active { background: #161c28; }
  .rest-card .top {
    display: flex; align-items: center; gap: 12px; margin-bottom: 12px;
  }
  .rest-card .num {
    width: 30px; height: 30px; border-radius: 50%;
    background: rgba(239,68,68,.12); color: #ef4444;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 800; flex-shrink: 0;
  }
  .rest-card .info { flex: 1; }
  .rest-card .name { font-size: 17px; font-weight: 700; color: #fff; }
  .rest-card .tag {
    display: inline-block; font-size: 11px; font-weight: 600;
    background: rgba(250,204,21,.12); color: #facc15;
    padding: 2px 10px; border-radius: 10px; margin-top: 4px;
  }
  .rest-card .actions {
    display: flex; gap: 8px; margin-top: 4px;
  }
  .rest-card .actions a {
    flex: 1; display: flex; align-items: center; justify-content: center;
    gap: 5px; padding: 10px 0;
    border-radius: 10px; font-size: 12px; font-weight: 600;
    text-decoration: none; transition: all .2s;
  }
  .rest-card .actions a:active { transform: scale(.96); }
  .rest-card .actions .maps {
    background: rgba(34,197,94,.1); color: #22c55e;
    border: 1px solid rgba(34,197,94,.15);
  }
  .rest-card .actions .maps:active { background: rgba(34,197,94,.2); }
  .rest-card .actions .search {
    background: rgba(96,165,250,.1); color: #60a5fa;
    border: 1px solid rgba(96,165,250,.15);
  }
  .rest-card .actions .search:active { background: rgba(96,165,250,.2); }
  .rest-card .actions .fb {
    background: rgba(59,130,246,.1); color: #3b82f6;
    border: 1px solid rgba(59,130,246,.15);
  }
  .rest-card .actions .fb:active { background: rgba(59,130,246,.2); }
  .source-link {
    margin-top: 24px; padding: 14px; text-align: center;
    background: #10141c; border-radius: 12px;
    border: 1px solid rgba(255,255,255,.04);
  }
  .source-link a { color: #60a5fa; font-size: 13px; text-decoration: none; }
  .source-link a:active { opacity: .7; }
  .back-link {
    display: block; text-align: center; margin-top: 16px;
    padding: 12px; border-radius: 12px;
    background: rgba(255,255,255,.03);
    color: #8892a8; font-size: 13px; text-decoration: none;
  }
  .back-link:active { background: rgba(255,255,255,.06); }
  .footer {
    text-align: center; padding: 30px 20px 40px;
    color: #4b5563; font-size: 12px;
  }
  @media (prefers-color-scheme: light) {
    body { background: #f5f5f7; color: #1d1d1f; }
    .header { background: linear-gradient(135deg, #fff, #f0f0f2); border-color: rgba(0,0,0,.06); }
    .header .sub { color: #6b7280; }
    .rest-card { background: #fff; border-color: rgba(0,0,0,.06); }
    .rest-card:active { background: #f0f0f2; }
    .rest-card .name { color: #1d1d1f; }
    .rest-card .actions .maps { background: rgba(34,197,94,.06); }
    .rest-card .actions .search { background: rgba(96,165,250,.06); }
    .rest-card .actions .fb { background: rgba(59,130,246,.06); }
    .source-link, .back-link { background: #fff; border-color: rgba(0,0,0,.06); }
  }
</style>
