  }
  .restaurant-list { display: flex; flex-direction: column; gap: 12px; }
  .rest-card {
    background: #10141c; border: 1px solid rgba(255,255,255,.06);
    border-radius: 14px; padding: 16px;
  }
  .rest-card .top {
    display: flex; align-items: center; gap: 12px; margin-bottom: 12px;
  }
  .rest-card .num {
    width: 30px; height: 30px; border-radius: 50%;
    background: rgba(239,68,68,.12); color: #ef4444;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 800; flex-shrink: 0;
  }
  .rest-card .info { flex: 1; }
  .rest-card .name { font-size: 17px; font-weight: 700; color: #fff; }
  .rest-card .tag {
    display: inline-block; font-size: 11px; font-weight: 600;
    background: rgba(250,204,21,.12); color: #facc15;
    padding: 2px 10px; border-radius: 10px; margin-top: 4px;
  }
  .rest-card .actions {
    display: flex; gap: 8px;
  }
  .rest-card .actions a {
    flex: 1; display: block; text-align: center;
    padding: 11px 0; border-radius: 10px;
    font-size: 14px; font-weight: 600; text-decoration: none;
  }
  .rest-card .actions a:active { opacity: .7; }
  .rest-card .actions .maps {
    background: rgba(34,197,94,.12); color: #22c55e;
    border: 1px solid rgba(34,197,94,.2);
  }
  .rest-card .actions .search {
    background: rgba(96,165,250,.12); color: #60a5fa;
    border: 1px solid rgba(96,165,250,.2);
  }
  .source-link {
    margin-top: 24px; padding: 14px; text-align: center;
    background: #10141c; border-radius: 12px;
    border: 1px solid rgba(255,255,255,.04);
  }
  .source-link a { color: #60a5fa; font-size: 13px; text-decoration: none; }
  .footer {
    text-align: center; padding: 30px 20px 40px;
    color: #4b5563; font-size: 12px;
  }
  @media (prefers-color-scheme: light) {
