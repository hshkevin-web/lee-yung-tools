<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}

body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  background:#0d0d0d;
  color:#e5e5e5;
  min-height:100vh;
  padding:6vw 5vw 20vw;
  max-width:600px;
  margin:0 auto;
}

/* ===== HEADER ===== */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:4vw 0 2vw;
  border-bottom:1px solid #222;
  margin-bottom:5vw;
}
.header h1{
  font-size:clamp(20px, 7vw, 32px);
  font-weight:700;
  color:#fbbf24;
  letter-spacing:0.5px;
}
.header .sub{
  font-size:clamp(12px, 3.5vw, 16px);
  color:#888;
  text-align:right;
}
.header .sub .date{color:#e5e5e5;font-weight:600}

/* ===== PROGRESS BAR ===== */
.progress-wrap{
  background:#1a1a1a;
  border-radius:100px;
  height:clamp(16px, 5vw, 24px);
  overflow:hidden;
  margin-bottom:3vw;
  position:relative;
}
.progress-bar{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#fbbf24,#f59e0b);
  border-radius:100px;
  transition:width 0.4s ease;
}
.progress-label{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  font-size:clamp(10px, 3vw, 14px);
  font-weight:600;
  color:#000;
  white-space:nowrap;
}

/* ===== STATS ROW ===== */
.stats{
  display:flex;
  gap:3vw;
  margin-bottom:5vw;
}
.stat-card{
  flex:1;
  background:#141414;
  border:1px solid #222;
  border-radius:3vw;
  padding:3vw;
  text-align:center;
}
.stat-card .num{
  font-size:clamp(18px, 8vw, 36px);
  font-weight:700;
  color:#fbbf24;
  line-height:1.2;
}
.stat-card .lbl{
  font-size:clamp(9px, 2.8vw, 13px);
  color:#666;
  margin-top:0.5vw;
}
.stat-card.streak .num{color:#34d399}
.stat-card.streak .lbl{color:#6ee7b7}

/* ===== CHECKLIST ===== */
.checklist{display:flex;flex-direction:column;gap:2.5vw}

.item{
  display:flex;
  align-items:center;
  gap:3.5vw;
  background:#141414;
  border:1px solid #222;
  border-radius:3vw;
  padding:3vw 4vw;
  transition:all 0.2s;
  cursor:pointer;
  -webkit-user-select:none;
  user-select:none;
}
.item:active{transform:scale(0.98)}
.item.done{
  border-color:#2a2a2a;
  background:#1a1a1a;
  opacity:0.7;
}
.item.done .num{color:#fbbf24;opacity:0.5}
.item.done .txt{text-decoration:line-through;color:#555}

/* Checkbox circle */
.check{
  width:clamp(22px, 7vw, 32px);
  height:clamp(22px, 7vw, 32px);
  min-width:clamp(22px, 7vw, 32px);
  border-radius:50%;
  border:2px solid #444;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:clamp(12px, 4vw, 18px);
  transition:all 0.2s;
  flex-shrink:0;
}
.item.done .check{
  background:#fbbf24;
  border-color:#fbbf24;
  color:#000;
}

/* Number badge */
.num{
  font-size:clamp(14px, 4vw, 18px);
  font-weight:700;
  color:#888;
  min-width:clamp(18px, 5vw, 24px);
  text-align:center;
  flex-shrink:0;
}

/* Text */
.txt{
  font-size:clamp(14px, 4vw, 18px);
  line-height:1.4;
  flex:1;
}
.txt .highlight{
  display:inline;
  font-weight:700;
  color:#fbbf24;
}
.txt .desc{
  display:block;
  font-size:clamp(11px, 3vw, 14px);
  color:#666;
  margin-top:0.8vw;
  line-height:1.4;
}

/* ===== RESET BUTTON ===== */
.actions{
  display:flex;
  gap:3vw;
  margin-top:6vw;
  justify-content:center;
}
.btn{
  padding:3vw 6vw;
  border-radius:100px;
  border:1px solid #333;
  background:#1a1a1a;
  color:#888;
  font-size:clamp(12px, 3.5vw, 16px);
  font-weight:600;
  cursor:pointer;
  transition:all 0.2s;
}
.btn:active{transform:scale(0.95)}
.btn.primary{
  background:#fbbf24;
  color:#000;
  border-color:#fbbf24;
}

/* ===== HISTORY ===== */
.section-title{
  font-size:clamp(14px, 4vw, 18px);
  font-weight:700;
  color:#888;
  margin-top:8vw;
  margin-bottom:3vw;
}
.history-list{
  display:flex;
  flex-wrap:wrap;
  gap:2vw;
}
.history-day{
  width:clamp(32px, 10vw, 44px);
  height:clamp(32px, 10vw, 44px);
  border-radius:2vw;
  background:#141414;
  border:1px solid #222;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  font-size:clamp(8px, 2.5vw, 11px);
  color:#555;
  position:relative;
}
.history-day.full{
  background:#1a2a0a;
  border-color:#4ade80;
  color:#4ade80;
}
.history-day.partial{
  background:#1a1a00;
  border-color:#fbbf24;
  color:#fbbf24;
}
.history-day .dot{
  font-size:clamp(10px, 3vw, 14px);
  line-height:1;
}

/* ===== INSTALL HINT ===== */
.install-hint{
  margin-top:8vw;
  padding:3vw 4vw;
  background:#1a1a00;
  border:1px solid #333;
  border-radius:3vw;
  text-align:center;
  font-size:clamp(10px, 3vw, 14px);
  color:#888;
  line-height:1.5;
}
.install-hint strong{color:#fbbf24}

/* ===== CONFETTI ===== */
.confetti-container{
  position:fixed;
  top:0;left:0;width:100%;height:100%;
  pointer-events:none;
  z-index:999;
  overflow:hidden;
}
.confetti-piece{
  position:absolute;
  top:-10px;
  width:10px;
  height:10px;
  border-radius:2px;
  animation:confettiFall 3s ease-out forwards;
}
@keyframes confettiFall{
  0%{transform:translateY(0) rotate(0deg);opacity:1}
  100%{transform:translateY(100vh) rotate(720deg);opacity:0}
}
</style>

<script>
// ===== DATA =====
const ITEMS = [
  { id:1, title:'💰 研究掙錢', desc:'主動開發多元收入來源：本業深耕提升專業價值、副業探索（接案/創業/顧問）、被動收入（股息/利息/租金）。建立6個月緊急預備金。設定年收入目標並拆解到每月每週行動。學習談判加薪與跳槽策略。追蹤現金流，每月記帳檢視收支。記住：財務自由不是有花不完的錢，而是你不用為錢妥協。' },
  { id:2, title:'📚 培養深度閱讀的習慣', desc:'每天至少閱讀30分鐘，優先讀經典而非碎片資訊。每年設定閱讀目標（建議24~36本）。建立主題閱讀清單：商業思維（巴菲特年報、查理蒙格）、歷史洞見（人類大歷史、槍炮病菌與鋼鐵）、投資經典（智慧型股票投資人、漫步華爾街）、人物傳記（愛因斯坦、達文西、賈伯斯）。讀完寫300字心得內化。利用通勤、排隊等零碎時間聽有聲書。' },
  { id:3, title:'🤝 結交良師益友', desc:'主動尋找比你優秀的人 — 參加產業聚會、專業社團、線上課程。建立mentor關係：定期約咖啡請教，提出具體問題而非泛泛而談。遠離消耗型關係，把時間留給會讓你成長的人。組建自己的「董事會」：3~5位不同領域但同樣追求成長的朋友，每月一次互相檢視進度、給彼此回饋。學會付出在前，先創造價值再索取建議。' },
  { id:4, title:'🏃 堅持鍛鍊身體', desc:'每週至少運動4次，每次30~45分鐘。混合有氧（慢跑/游泳/騎車）+ 肌力訓練（徒手/重訓）+ 柔軟度（瑜伽/拉伸）。設定可量化的體能目標（5公里跑進30分、伏地挺身50下、體脂率達標）。運動排進行事曆，像開會一樣不可取消。找一個運動夥伴互相督促。充足睡眠（7~8小時）和飲水是訓練的一環。身體是人生唯一不能換的硬體。' },
  { id:5, title:'🧘 學會情緒管理', desc:'辨識情緒觸發點：什麼人、什麼情境最容易讓你失控？建立10秒暫停法則 — 情緒上來時先深呼吸10秒再回應。每天5分鐘冥想練習，訓練專注力與覺察力。寫情緒日記：記錄每天的情緒波動、原因與應對方式。區分可控與不可控：只專注自己能改變的部分，接受無法改變的。練習復原力：把挫折視為數據而非失敗，問「我從這裡學到什麼？」' },
  { id:6, title:'🎯 專注長期目標', desc:'寫下你10年後想成為什麼樣的人，反推5年目標、年度里程碑、季度重點、月度行動。使用OKR方法：每個季度設定2~3個關鍵結果，每週檢視進度。建立「不做清單」— 明確拒絕那些與長期目標不符的機會。每天先做最重要的一件事（MIT），完成再處理瑣事。定期（每月/每季）覆盤：偏離軌道了嗎？需要調整嗎？耐心是最被低估的優勢。' },
  { id:7, title:'🔄 持續自我反思', desc:'每天睡前5分鐘寫3件事：今天做對了什麼？哪裡可以更好？明天最重要的1件事是什麼？每週日做一次週覆盤：檢視本週成果 vs 計劃、時間花在哪、情緒能量曲線。每月做一次深度覆盤：目標進度、學習收穫、人際關係、健康狀態。對自己誠實 — 最痛的反思往往最有價值。建立改善行動清單，把反思轉化為具體改變。' },
  { id:8, title:'📊 學習投資理財知識', desc:'建立財務知識架構：資產配置（股債比例與再平衡）、風險管理（保險/緊急預備金）、稅務規劃（節稅策略）、被動投資（指數ETF長期持有）。閱讀經典：彼得林區選股戰略、投資最重要的事、窮查理的普通常識。每月追蹤投資組合績效 vs 大盤。了解自己的風險承受度，不盲目跟風。建立投資紀律：定期定額、不擇時、長期持有優質資產。' },
  { id:9, title:'👨‍👩‍👧‍👦 重視家庭關係', desc:'每週固定家庭時間 — 不帶手機、全心陪伴。安排一對一時間：另一半約會夜、每個孩子單獨相處。建立家庭傳統：週日早午餐、節日儀式、年度家庭旅行。主動關心家人近況，不只是過節才聯絡。學會表達感謝和愛 — 不要預設對方知道。在家庭和工作之間設立界線：回家後不談公事。記住：你的事業只是劇情，家庭才是結局。' },
  { id:10, title:'🎁 懂得回饋社會', desc:'從身邊開始：關心同事、鄰居、社區。定期定額捐款給認同的公益組織（每月收入的1~5%是合理起點）。用專業回饋：義務顧問、演講分享、 mentor 年輕後輩。參加志工活動，實際付出時間而非只捐錢。建立傳承計劃：把你學到的知識和經驗記錄下來，留給下一代。回饋不必等到有錢有閒 — 從現在就能開始，一杯咖啡的時間或一句鼓勵的話都有意義。' }
];

// ===== HELPERS =====
function getToday(){return new Date().toISOString().slice(0,10)}
function getDayKey(d){return 'd:'+d}
function getHistoryKey(){return 'history'}

function loadDay(date){
  const raw = localStorage.getItem(getDayKey(date));
  if(!raw) return {done:{},ts:null};
  try{return JSON.parse(raw)}catch{return {done:{},ts:null}}
}
function saveDay(date, data){
  localStorage.setItem(getDayKey(date), JSON.stringify(data));
}
function loadHistory(){
  const raw = localStorage.getItem(getHistoryKey());
  if(!raw) return {};
  try{return JSON.parse(raw)}catch{return {}}
}
function saveHistory(h){localStorage.setItem(getHistoryKey(), JSON.stringify(h))}

function getStreak(today, history){
  let streak = 0;
  let d = new Date(today);
  while(true){
    const key = getDayKey(d.toISOString().slice(0,10));
    const day = loadDay(d.toISOString().slice(0,10));
    const count = Object.values(day.done).filter(Boolean).length;
    if(count >= 10){streak++}
    else if(count > 0 && count < 10){streak++;break}
    else break;
    d.setDate(d.getDate()-1);
  }
  return streak;
}

// ===== RENDER =====
const today = getToday();
const dayData = loadDay(today);

function render(){
  const dateEl = document.getElementById('todayDate');
  const now = new Date();
  const weekdays = ['日','一','二','三','四','五','六'];
  dateEl.textContent = `${now.getFullYear()}/${String(now.getMonth()+1).padStart(2,'0')}/${String(now.getDate()).padStart(2,'0')} 週${weekdays[now.getDay()]}`;

  const doneCount = Object.values(dayData.done).filter(Boolean).length;

  // Progress bar
  const pct = Math.round((doneCount/ITEMS.length)*100);
  document.getElementById('progressBar').style.width = pct+'%';
  document.getElementById('progressLabel').textContent = `${doneCount} / ${ITEMS.length}`;

  // Stats
  document.getElementById('todayCount').textContent = doneCount;

  const history = loadHistory();
  const totalDays = Object.keys(history).length;
  document.getElementById('totalDays').textContent = totalDays;

  const streak = getStreak(today, history);
  document.getElementById('streakCount').textContent = streak;

  // Day label
  const firstDay = localStorage.getItem('firstDay') || today;
  const dayNum = Math.floor((new Date(today) - new Date(firstDay)) / 86400000) + 1;
  document.getElementById('dayLabel').textContent = `第 ${dayNum} 天`;

  // Checklist
  const list = document.getElementById('checklist');
  list.innerHTML = '';
  ITEMS.forEach(item => {
    const isDone = dayData.done[item.id] || false;
    const div = document.createElement('div');
    div.className = 'item' + (isDone ? ' done' : '');
    div.dataset.id = item.id;
    div.innerHTML = `
      <div class="check">${isDone ? '✓' : ''}</div>
      <div class="num">${String(item.id).padStart(2,'0')}</div>
      <div class="txt">
        <span class="highlight">${item.title}</span>
        <span class="desc">${item.desc}</span>
      </div>
    `;
    div.addEventListener('click', ()=>{
      dayData.done[item.id] = !dayData.done[item.id];
      dayData.ts = Date.now();
      saveDay(today, dayData);
      updateHistory();
      render();
      if(dayData.done[item.id] && doneCount+1 === ITEMS.length){
        fireConfetti();
      }
    });
    list.appendChild(div);
  });

  // History
  renderHistory();
}

function renderHistory(){
  const container = document.getElementById('historyList');
  const history = loadHistory();
  const dates = Object.keys(history).sort().reverse().slice(0,30);

  container.innerHTML = dates.map(d => {
    const day = loadDay(d);
    const count = Object.values(day.done).filter(Boolean).length;
    const cls = count === ITEMS.length ? 'full' : (count > 0 ? 'partial' : '');
    const lbl = d.slice(5); // MM-DD
    return `<div class="history-day ${cls}">${lbl}</div>`;
  }).join('') || '<div style="color:#444;font-size:14px">還沒有記錄</div>';
}

function updateHistory(){
  const history = loadHistory();
  history[today] = Date.now();
  saveHistory(history);
  if(!localStorage.getItem('firstDay')) localStorage.setItem('firstDay', today);
}

// ===== ACTIONS =====
document.getElementById('resetTodayBtn').addEventListener('click', ()=>{
  if(confirm('確定要重設今日進度？')){
    dayData.done = {};
    dayData.ts = Date.now();
    saveDay(today, dayData);
    render();
  }
});
document.getElementById('completeAllBtn').addEventListener('click', ()=>{
  ITEMS.forEach(item => {dayData.done[item.id] = true});
  dayData.ts = Date.now();
  saveDay(today, dayData);
  updateHistory();
  render();
  fireConfetti();
});

// ===== CONFETTI =====
function fireConfetti(){
  const container = document.createElement('div');
  container.className = 'confetti-container';
  const colors = ['#fbbf24','#34d399','#60a5fa','#f472b6','#a78bfa','#fb923c'];
  for(let i=0;i<40;i++){
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    piece.style.left = Math.random()*100+'%';
    piece.style.background = colors[Math.floor(Math.random()*colors.length)];
    piece.style.width = (Math.random()*8+4)+'px';
    piece.style.height = (Math.random()*8+4)+'px';
    piece.style.animationDuration = (Math.random()*2+2)+'s';
    piece.style.animationDelay = Math.random()*0.5+'s';
    container.appendChild(piece);
  }
  document.body.appendChild(container);
  setTimeout(()=>container.remove(), 4000);
}

// ===== INIT =====
updateHistory();
render();

// ===== SERVICE WORKER for offline =====
if('serviceWorker' in navigator){
  const swCode = `
const CACHE = 'buffett-v1';
self.addEventListener('install', e => {
  e.waitUntil(caches.open(CACHE).then(c => c.addAll(['./buffett-checklist.html'])));
  self.skipWaiting();
});
self.addEventListener('activate', e => e.waitUntil(clients.claim()));
self.addEventListener('fetch', e => {
  e.respondWith(
    caches.match(e.request).then(r => r || fetch(e.request).catch(() => r))
  );
});
  `;
  const blob = new Blob([swCode], {type:'application/javascript'});
  const url = URL.createObjectURL(blob);
  navigator.serviceWorker.register(url).catch(()=>{});
}
</script>
