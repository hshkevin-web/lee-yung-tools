<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}

body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  background:#ffffff;
  color:#1a1a1a;
  min-height:100vh;
  padding:8vw 6vw 25vw;
  max-width:600px;
  margin:0 auto;
}

/* ===== HEADER ===== */
.header{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  padding:4vw 0 3vw;
  border-bottom:2px solid #e5e5e5;
  margin-bottom:6vw;
}
.header h1{
  font-size:clamp(24px, 9vw, 40px);
  font-weight:800;
  color:#b45309;
  letter-spacing:0.5px;
}
.header .sub{
  font-size:clamp(14px, 4.5vw, 20px);
  color:#666;
  text-align:right;
  line-height:1.5;
}
.header .sub .date{color:#1a1a1a;font-weight:700}

/* ===== PROGRESS BAR ===== */
.progress-wrap{
  background:#e5e5e5;
  border-radius:100px;
  height:clamp(24px, 7vw, 34px);
  overflow:hidden;
  margin-bottom:4vw;
  position:relative;
}
.progress-bar{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#d97706,#f59e0b);
  border-radius:100px;
  transition:width 0.4s ease;
}
.progress-label{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  font-size:clamp(13px, 4vw, 18px);
  font-weight:700;
  color:#fff;
  text-shadow:0 1px 2px rgba(0,0,0,0.3);
  white-space:nowrap;
}

/* ===== STATS ROW ===== */
.stats{
  display:flex;
  gap:3vw;
  margin-bottom:6vw;
}
.stat-card{
  flex:1;
  background:#f9f9f9;
  border:1px solid #e5e5e5;
  border-radius:4vw;
  padding:4vw 2vw;
  text-align:center;
}
.stat-card .num{
  font-size:clamp(24px, 10vw, 44px);
  font-weight:800;
  color:#d97706;
  line-height:1.2;
}
.stat-card .lbl{
  font-size:clamp(11px, 3.5vw, 16px);
  color:#888;
  margin-top:1vw;
  font-weight:600;
}
.stat-card.streak .num{color:#059669}
.stat-card.streak .lbl{color:#059669}

/* ===== CHECKLIST ===== */
.checklist{display:flex;flex-direction:column;gap:3vw}

.item{
  display:flex;
  align-items:flex-start;
  gap:4vw;
  background:#fafafa;
  border:1.5px solid #e0e0e0;
  border-radius:4vw;
  padding:4vw 5vw;
  transition:all 0.2s;
  cursor:pointer;
  -webkit-user-select:none;
  user-select:none;
}
.item:active{transform:scale(0.98);background:#f0f0f0}
.item.done{
  border-color:#d4d4d4;
  background:#f5f5f5;
  opacity:0.75;
}
.item.done .num{color:#b45309;opacity:0.4}
.item.done .txt{text-decoration:line-through;color:#999}

/* Checkbox circle */
.check{
  width:clamp(28px, 8vw, 38px);
  height:clamp(28px, 8vw, 38px);
  min-width:clamp(28px, 8vw, 38px);
  border-radius:50%;
  border:2.5px solid #bbb;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:clamp(16px, 5vw, 22px);
  transition:all 0.2s;
  flex-shrink:0;
  margin-top:0.5vw;
}
.item.done .check{
  background:#d97706;
  border-color:#d97706;
  color:#fff;
}

/* Number badge */
.num{
  font-size:clamp(18px, 5.5vw, 26px);
  font-weight:800;
  color:#bbb;
  min-width:clamp(22px, 6vw, 30px);
  text-align:center;
  flex-shrink:0;
  margin-top:0.5vw;
}

/* Text */
.txt{
  font-size:clamp(16px, 4.8vw, 22px);
  line-height:1.5;
  flex:1;
}
.txt .highlight{
  display:inline;
  font-weight:800;
  color:#92400e;
  font-size:clamp(17px, 5vw, 24px);
}
.txt .desc{
  display:block;
  font-size:clamp(14px, 4vw, 19px);
  color:#555;
  margin-top:2vw;
  line-height:1.6;
}
.txt .desc b{
  color:#b45309;
}

/* ===== NOTE SECTION ===== */
.note-section{
  margin-top:3vw;
  border-top:1px dashed #e0e0e0;
  padding-top:2.5vw;
  display:none;
}
.note-section.has-text{display:block}
.item.has-note .note-section{display:block}

.note-row{
  display:flex;
  gap:2vw;
  align-items:flex-start;
}
.note-input{
  flex:1;
  border:1.5px solid #d4d4d4;
  border-radius:3vw;
  padding:2.5vw 3vw;
  font-size:clamp(14px, 4vw, 19px);
  font-family:inherit;
  background:#fff;
  color:#1a1a1a;
  resize:none;
  outline:none;
  min-height:clamp(36px, 11vw, 50px);
  line-height:1.5;
  transition:border-color 0.2s;
}
.note-input:focus{
  border-color:#d97706;
  box-shadow:0 0 0 2px rgba(217,119,6,0.15);
}
.note-input::placeholder{
  color:#bbb;
  font-size:clamp(13px, 3.5vw, 17px);
}

.mic-btn{
  min-width:clamp(36px, 11vw, 50px);
  height:clamp(36px, 11vw, 50px);
  border-radius:50%;
  border:1.5px solid #d4d4d4;
  background:#fff;
  font-size:clamp(18px, 5.5vw, 26px);
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  transition:all 0.2s;
  flex-shrink:0;
}
.mic-btn:active{
  transform:scale(0.9);
  background:#fef3c7;
  border-color:#d97706;
}

.listening-badge{
  margin-top:2vw;
  font-size:clamp(12px, 3.5vw, 16px);
  color:#d97706;
  font-weight:600;
  animation:pulse 1.5s ease-in-out infinite;
}
@keyframes pulse{
  0%,100%{opacity:1}
  50%{opacity:0.5}
}

.note-status{
  margin-top:1.5vw;
  font-size:clamp(11px, 3vw, 14px);
  color:#059669;
  font-weight:600;
} 

/* ===== RESET BUTTON ===== */
.actions{
  display:flex;
  gap:3vw;
  margin-top:8vw;
  justify-content:center;

.btn{
  padding:4vw 8vw;
  border-radius:100px;

  background:#fff;
  color:#666;
  font-size:clamp(15px, 4.5vw, 20px);
  font-weight:700;
  cursor:pointer;
  transition:all 0.2s;
}
.btn:active{transform:scale(0.95)}
.btn.primary{
  background:#d97706;
  color:#fff;
  border-color:#d97706;
}

/* ===== HISTORY ===== */
.section-title{
  font-size:clamp(17px, 5vw, 24px);
  font-weight:800;
  color:#666;
  margin-top:10vw;
  margin-bottom:4vw;
}
.history-list{
  display:flex;
  flex-wrap:wrap;
  gap:2.5vw;
}
.history-day{
  width:clamp(38px, 11vw, 50px);
  height:clamp(38px, 11vw, 50px);
  border-radius:2.5vw;
  background:#f5f5f5;
  border:1.5px solid #e0e0e0;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  font-size:clamp(10px, 3vw, 14px);
  color:#999;
  font-weight:600;
  position:relative;
}
.history-day.full{
  background:#ecfdf5;
  border-color:#059669;
  color:#059669;
}
.history-day.partial{
  background:#fffbeb;
  border-color:#d97706;
  color:#d97706;
}

/* ===== INSTALL HINT ===== */
.install-hint{
  margin-top:10vw;
  padding:4vw 5vw;
  background:#fffbeb;
  border:1.5px solid #fde68a;
  border-radius:4vw;
  text-align:center;
  font-size:clamp(13px, 4vw, 18px);
  color:#92400e;
  line-height:1.6;
  font-weight:600;
}
.install-hint strong{color:#b45309}

/* ===== CONFETTI ===== */
.confetti-container{
  position:fixed;
  top:0;left:0;width:100%;height:100%;
  pointer-events:none;
  z-index:999;
  overflow:hidden;
}
.confetti-piece{
  position:absolute;
  top:-10px;
  width:10px;
  height:10px;
  border-radius:2px;
  animation:confettiFall 3s ease-out forwards;
}
@keyframes confettiFall{
  0%{transform:translateY(0) rotate(0deg);opacity:1}
  100%{transform:translateY(100vh) rotate(720deg);opacity:0}
}
</style>
</head>

// ===== HELPERS =====
function getToday(){return new Date().toISOString().slice(0,10)}
function getDayKey(d){return 'd:'+d}
function getHistoryKey(){return 'history'}

function loadDay(date){
  const raw = localStorage.getItem(getDayKey(date));
  if(!raw) return {done:{},ts:null};
  try{return JSON.parse(raw)}catch{return {done:{},ts:null}}
}
function saveDay(date, data){
  localStorage.setItem(getDayKey(date), JSON.stringify(data));
}
function loadHistory(){
  const raw = localStorage.getItem(getHistoryKey());
  if(!raw) return {};
  try{return JSON.parse(raw)}catch{return {}}
}
function saveHistory(h){localStorage.setItem(getHistoryKey(), JSON.stringify(h))}

function getStreak(today, history){
  let streak = 0;
  let d = new Date(today);
  while(true){
    const key = getDayKey(d.toISOString().slice(0,10));
    const day = loadDay(d.toISOString().slice(0,10));
    const count = Object.values(day.done).filter(Boolean).length;
    if(count >= 10){streak++}
    else if(count > 0 && count < 10){streak++;break}
    else break;
    d.setDate(d.getDate()-1);
  }
  return streak;
}

// ===== RENDER =====
const today = getToday();
const dayData = loadDay(today);

function render(){
  const dateEl = document.getElementById('todayDate');
  const now = new Date();
  const weekdays = ['日','一','二','三','四','五','六'];
  dateEl.textContent = `${now.getFullYear()}/${String(now.getMonth()+1).padStart(2,'0')}/${String(now.getDate()).padStart(2,'0')} 週${weekdays[now.getDay()]}`;

  const doneCount = Object.values(dayData.done).filter(Boolean).length;

  // Progress bar
  const pct = Math.round((doneCount/ITEMS.length)*100);
  document.getElementById('progressBar').style.width = pct+'%';
  document.getElementById('progressLabel').textContent = `${doneCount} / ${ITEMS.length}`;

  // Stats
  document.getElementById('todayCount').textContent = doneCount;

  const history = loadHistory();
  const totalDays = Object.keys(history).length;
  document.getElementById('totalDays').textContent = totalDays;

  const streak = getStreak(today, history);
  document.getElementById('streakCount').textContent = streak;

  // Day label
  const firstDay = localStorage.getItem('firstDay') || today;
  const dayNum = Math.floor((new Date(today) - new Date(firstDay)) / 86400000) + 1;
  document.getElementById('dayLabel').textContent = `第 ${dayNum} 天`;

  // Checklist
  const list = document.getElementById('checklist');
  list.innerHTML = '';
  ITEMS.forEach(item => {
  const isDone = dayData.done[item.id] || false;
  const note = dayData.notes && dayData.notes[item.id] ? dayData.notes[item.id] : '';
  const isListening = dayData.listening === item.id;
  const showNotes = note || isListening;
  const div = document.createElement('div');
  div.className = 'item' + (isDone ? ' done' : '') + (showNotes ? ' has-note' : '');
  div.dataset.id = item.id;
  div.innerHTML = `
    <div class="check">${isDone ? '✓' : ''}</div>
    <div class="num">${String(item.id).padStart(2,'0')}</div>
    <div class="txt">
      <span class="highlight">${item.title}</span>
      <span class="desc">${item.desc}</span>
      <div class="note-section ${note ? 'has-text' : ''}">
        <div class="note-row">
          <textarea class="note-input" rows="${note ? 3 : 1}" placeholder="📝 記錄今天的執行細節或心得…" data-id="${item.id}">${note}</textarea>
          <button class="mic-btn" data-id="${item.id}">${isListening ? '🔴' : '🎤'}</button>
        </div>
        ${isListening ? '<div class="listening-badge">🎤 語音輸入中… 說完會自動停止</div>' : ''}
        ${note ? '<div class="note-status">📌 已記錄</div>' : ''}
      </div>
    </div>
  `;

  // Click on item (not textarea/button) toggles checkbox
  div.addEventListener('click', (e)=>{
    if(e.target.closest('.note-section')) return;
    dayData.done[item.id] = !dayData.done[item.id];
    dayData.ts = Date.now();
    saveDay(today, dayData);
    updateHistory();
    render();
    if(dayData.done[item.id] && Object.values(dayData.done).filter(Boolean).length === ITEMS.length){
      fireConfetti();
    }
  });
  list.appendChild(div);
  });

  // Attach note auto-save + mic events after render
  document.querySelectorAll('.note-input').forEach(ta => {
  ta.addEventListener('input', function(){
    if(!dayData.notes) dayData.notes = {};
    dayData.notes[this.dataset.id] = this.value;
    dayData.ts = Date.now();
    saveDay(today, dayData);
    // Update has-note class on parent
    this.closest('.item').classList.toggle('has-note', this.value.trim().length > 0);
  });
  // Auto-resize
  ta.addEventListener('input', function(){
    this.style.height = 'auto';
    this.style.height = this.scrollHeight + 'px';
  });
  setTimeout(()=>{
    ta.style.height = 'auto';
    ta.style.height = ta.scrollHeight + 'px';
  }, 0);
  });

  document.querySelectorAll('.mic-btn').forEach(btn => {
  btn.addEventListener('click', function(e){
    e.stopPropagation();
    const id = this.dataset.id;
    startVoiceInput(id);
  });
  });

  // History
  renderHistory();
}

function renderHistory(){
  const container = document.getElementById('historyList');
  const history = loadHistory();
  const dates = Object.keys(history).sort().reverse().slice(0,30);

  container.innerHTML = dates.map(d => {
    const day = loadDay(d);
    const count = Object.values(day.done).filter(Boolean).length;
    const cls = count === ITEMS.length ? 'full' : (count > 0 ? 'partial' : '');
    const lbl = d.slice(5); // MM-DD
    return `<div class="history-day ${cls}">${lbl}</div>`;
  }).join('') || '<div style="color:#444;font-size:14px">還沒有記錄</div>';
}

function updateHistory(){
  const history = loadHistory();
  history[today] = Date.now();
  saveHistory(history);
  if(!localStorage.getItem('firstDay')) localStorage.setItem('firstDay', today);
}

// ===== ACTIONS =====

  if(confirm('確定要重設今日進度？筆記也會一併清除。')){
    dayData.done = {};

});

// ===== VOICE INPUT =====
let recognition = null;
function startVoiceInput(itemId){
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SpeechRecognition){
    alert('您的瀏覽器不支援語音輸入。請用 Chrome 或 Android 瀏覽器。');
    return;
  }
  // If already listening for this item, stop
  if(dayData.listening === itemId && recognition){
    recognition.stop();
    dayData.listening = null;
    saveDay(today, dayData);
    render();
    return;
  }
  // Stop any existing recognition first
  if(recognition) recognition.stop();

  recognition = new SpeechRecognition();
  recognition.lang = 'zh-TW';
  recognition.continuous = true;
  recognition.interimResults = true;

  dayData.listening = itemId;
  saveDay(today, dayData);
  render();

  let finalTranscript = '';
  const ta = document.querySelector(`.note-input[data-id="${itemId}"]`);

  recognition.onresult = function(event){
    let interim = '';
    for(let i = event.resultIndex; i < event.results.length; i++){
      const result = event.results[i];
      if(result.isFinal){
        finalTranscript += result[0].transcript;
      } else {
        interim += result[0].transcript;
      }
    }
    if(ta){
      const existing = dayData.notes && dayData.notes[itemId] ? dayData.notes[itemId] : '';
      // Only update with final results
      if(finalTranscript){
        const newVal = existing + (existing && !existing.endsWith(' ') && !existing.endsWith('\n') ? ' ' : '') + finalTranscript;
        ta.value = newVal;
        ta.style.height = 'auto';
        ta.style.height = ta.scrollHeight + 'px';
        if(!dayData.notes) dayData.notes = {};
        dayData.notes[itemId] = newVal;
        dayData.ts = Date.now();
        saveDay(today, dayData);
        finalTranscript = '';
      }
    }
  };

  recognition.onerror = function(event){
    console.log('Speech error:', event.error);
    dayData.listening = null;
    saveDay(today, dayData);
    render();
    if(event.error === 'not-allowed'){
      alert('請允許麥克風權限才能使用語音輸入。');
    }
  };

  recognition.onend = function(){
    // Save any leftover transcript BEFORE render
    if(finalTranscript && itemId){
      if(!dayData.notes) dayData.notes = {};
      const existing = dayData.notes[itemId] || '';
      const sep = existing && !existing.endsWith(' ') && !existing.endsWith('\n') ? ' ' : '';
      dayData.notes[itemId] = existing + sep + finalTranscript;
      dayData.ts = Date.now();
    }
    dayData.listening = null;
    saveDay(today, dayData);
    render();
    // After re-render, directly update the textarea value to be sure
    if(finalTranscript){
      const newTa = document.querySelector(`.note-input[data-id="${itemId}"]`);
      if(newTa){
        newTa.value = dayData.notes[itemId] || '';
        newTa.style.height = 'auto';
        newTa.style.height = newTa.scrollHeight + 'px';
      }
    }
    finalTranscript = '';
  };

  try {
    recognition.start();
  } catch(e){
    dayData.listening = null;
    saveDay(today, dayData);
    render();
  }
}

// Also stop on page unload
window.addEventListener('beforeunload', ()=>{
  if(recognition) recognition.stop();
});

// ===== CONFETTI =====
function fireConfetti(){
  const container = document.createElement('div');
  container.className = 'confetti-container';
  const colors = ['#fbbf24','#34d399','#60a5fa','#f472b6','#a78bfa','#fb923c'];
  for(let i=0;i<40;i++){
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    piece.style.left = Math.random()*100+'%';
    piece.style.background = colors[Math.floor(Math.random()*colors.length)];
    piece.style.width = (Math.random()*8+4)+'px';
    piece.style.height = (Math.random()*8+4)+'px';
    piece.style.animationDuration = (Math.random()*2+2)+'s';
    piece.style.animationDelay = Math.random()*0.5+'s';
    container.appendChild(piece);
  }
  document.body.appendChild(container);
  setTimeout(()=>container.remove(), 4000);
}

// ===== INIT =====
updateHistory();
render();

self.addEventListener('install', e => {
  e.waitUntil(caches.open(CACHE).then(c => c.addAll(['./buffett-checklist.html'])));
  self.skipWaiting();
});
self.addEventListener('activate', e => e.waitUntil(clients.claim()));
self.addEventListener('fetch', e => {
  e.respondWith(
    caches.match(e.request).then(r => r || fetch(e.request).catch(() => r))
  );
});
  `;
  const blob = new Blob([swCode], {type:'application/javascript'});
  const url = URL.createObjectURL(blob);
  navigator.serviceWorker.register(url).catch(()=>{});
}
