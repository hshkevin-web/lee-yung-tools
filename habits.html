<script>

{ic:'🌅',t:'規律早起',s:'green',sd:'早起者的決策品質與生產力明顯優於夜貓族。',al:['起床喝一杯溫水醒身體','做5分鐘伸展或冥想','規劃今天最重要的3件事','起床30分鐘內不滑手機'],ti:'固定起床時間（含假日），前一晚準備好明天衣物，減少早晨決策。'},
{ic:'🎯',t:'單任務專注',s:'yellow',sd:'頻繁切換任務每次損失40%生產力。深層專注才是稀缺競爭力。',al:['關閉手機所有非必要通知','番茄鐘25分專注+5分休息','一次只開一個瀏覽器分頁','完成當前任務才切換'],ti:'創建「專注歌單」啟動大腦。實體時鐘比手機計時更有效。'},

{ic:'🚫',t:'學會勇敢拒絕',s:'yellow',sd:'高成就者都有強大的拒絕能力。每個「好」背後都有一個「不好」。',al:['拒絕一個無意義邀約','保護連續2小時專注時間','不在非優先事項花超過15分','練習說「我現在沒辦法」'],ti:'拒絕不需解釋。「我還有安排」已足夠。保護時間不是自私。'},
{ic:'💛',t:'常懷感恩善意',s:'green',sd:'每日感恩練習讓幸福指數高出25%。成功是帶著溫度前行。',al:['用心感謝一個人','寫下一件感恩的事','主動做一件不求回報的小事','對家人說一句溫暖的話'],ti:'感恩不必宏大。一杯好咖啡、一路綠燈——注意到微小美好的人運氣不差。'},
{ic:'📢',t:'持續輸出',s:'yellow',sd:'費曼學習法：教是最好的學。輸入輸出形成閉環。',al:['本週寫一篇文章或筆記','用自己的話解釋一個概念','把學到的分享出去','收集一個反饋並優化'],ti:'先完成再完美。第一篇粗糙沒關係，第十篇會讓你驚訝。'},
{ic:'🧠',t:'獨立思考',s:'green',sd:'不被算法和輿論牽著走。理性思辨才是真正的自由。',al:['看到新聞先問來源是誰','想事情的底層邏輯與目的','不被情緒帶走先停10秒','寫下自己觀點再查資料'],ti:'每天5分鐘讀一篇與自己立場相反的文章。理解對方為什麼這樣想。'},
{ic:'🚀',t:'擁抱挑戰未知',s:'green',sd:'舒適區是安全的牢籠。成長永遠在舒適區之外。',al:['做一件讓自己害怕的事','學一個過去覺得太難的東西','記錄這次挑戰學到的教訓','慶祝自己跨出這一步'],ti:'每天進步1%，一年後強37倍。舒適區邊緣的「學習區」最適合成長。'}
];
const SL={green:'✅ 已內化',yellow:'🔶 可強化',gray:'⚪️ 待建立'};const SC={green:'g',yellow:'y',gray:'x'};
let st=load();let exp={};let nhOpen={};let wrOpen=false;

function load(){try{const d=JSON.parse(localStorage.getItem('h12v2'));if(d&&d.habits&&d.habits.length===12)return d}catch(e){}return{habits:HH.map(h=>h.status),weekly:{},actions:{},notes:{}}}
function sv(){localStorage.setItem('h12v2',JSON.stringify(st));const t=document.getElementById('tt');t.classList.add('s');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('s'),1500)}
function wk(){const n=new Date(),s=new Date(n.getFullYear(),0,1);return n.getFullYear()+'-W'+String(Math.ceil(((n-s)/86400000+s.getDay()+1)/7)).padStart(2,'0')}
function di(){return(new Date().getDay()+6)%7}
function nowStr(){const d=new Date();return d.getFullYear()+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+String(d.getDate()).padStart(2,'0')+' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0')}

// ===== WEEK DATE RANGE =====
function getWeekRange(){
 const n=new Date();const day=n.getDay();const mon=new Date(n);mon.setDate(n.getDate()-(day===0?6:day-1));
 const sun=new Date(mon);sun.setDate(mon.getDate()+6);
 const fmt=d=>d.getFullYear()+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+String(d.getDate()).padStart(2,'0');
 return{start:fmt(mon),end:fmt(sun),mon,sun};
}
function isThisWeek(dateStr){
 // dateStr format: "2026/06/26 14:30"
 const d=new Date(dateStr);const r=getWeekRange();
 return d>=r.mon&&d<=r.sun;
}

// ===== BUILD WEEKLY REPORT =====
function buildWeeklyReport(){
 const notes=st.notes||{};let total=0;let allItems=[];
 HH.forEach((h,i)=>{
  const ns=notes[i]||[];
  const weekNotes=ns.filter(n=>isThisWeek(n.date));
  if(weekNotes.length>0){
   allItems.push({idx:i,habit:h,notes:weekNotes});total+=weekNotes.length;
  }
 });
 document.getElementById('wrCount').textContent='📝 '+total+' 則心得';

 if(total===0){
  document.getElementById('wrContent').innerHTML=
   '<div class="wr-empty"><div class="big">📝</div>本週還沒有記錄心得<br>展開習慣卡片，用語音或文字記錄吧！</div>';
  return;
 }
 let html='';
 allItems.forEach(({idx,habit:h,notes:ns})=>{
  const status=st.habits[idx]||'gray';
  const icon={green:'✅',yellow:'🔶',gray:'⚪️'};
  html+='<div class="wr-group"><div class="wg-hdr">'+icon[status]+' '+h.ic+' '+h.t+' <span style="color:#4b5563;font-weight:400;font-size:3.2vw">('+ns.length+' 則)</span></div>';
  ns.forEach(n=>{html+='<div class="wg-item"><div class="wg-date">'+n.date+'</div><div class="wg-text">'+escHtml(n.text)+'</div></div>';});
  html+='</div>';
 });
 document.getElementById('wrContent').innerHTML=html;
}

function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

// ===== COPY WEEKLY NOTES =====
function copyWeeklyNotes(){
 const notes=st.notes||{};const r=getWeekRange();
 let text='📊 本週習慣筆記總覽\n'+r.start+' ~ '+r.end+'\n'+'─'.repeat(20)+'\n\n';
 let total=0;
 HH.forEach((h,i)=>{
  const ns=notes[i]||[];const weekNotes=ns.filter(n=>isThisWeek(n.date));
  if(weekNotes.length>0){
   const status=st.habits[i]||'gray';const icon={green:'✅',yellow:'🔶',gray:'⚪️'};
   text+=icon[status]+' '+h.ic+' '+h.t+'\n';
   weekNotes.forEach(n=>{text+='  ['+n.date+'] '+n.text+'\n';});
   text+='\n';total+=weekNotes.length;
  }
 });
 if(total===0){text+='本週尚未記錄任何心得 📝\n\n展開習慣卡片開始記錄吧！';}
 text+='─'.repeat(20)+'\n'+'共 '+total+' 則心得\n\nvia 12習慣追蹤';

 if(navigator.clipboard&&navigator.clipboard.writeText){
  navigator.clipboard.writeText(text).then(()=>showToast('📋 已複製到剪貼簿！'));
 }else{
  // Fallback for older iOS
  const ta=document.createElement('textarea');ta.value=text;ta.style.position='fixed';ta.style.opacity='0';
  document.body.appendChild(ta);ta.select();
  try{document.execCommand('copy');showToast('📋 已複製！');}catch(e){showToast('⚠️ 複製失敗，請手動選取');}
  document.body.removeChild(ta);
 }
}

function showToast(msg){const t=document.getElementById('tt');t.textContent=msg;t.classList.add('s');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('s'),1800)}

// ===== RENDER =====
function render(){rC();rW();uS();document.getElementById('wn').textContent=wk();buildWeeklyReport()}

// ===== RENDER CARDS =====
function rC(){
 const g=document.getElementById('cds');g.innerHTML='';
 HH.forEach((h,i)=>{
  const s=st.habits[i];const e=!!exp[i];const c=document.createElement('div');
  c.className='card'+(e?' exp':'');c.dataset.s=i;
  c.innerHTML='<div class="card-hdr"><div class="sb"></div><div class="ci">'+h.ic+'</div><div class="cn">'+String(i+1).padStart(2,'0')+'</div><div class="ct"><h3>'+h.t+'</h3><div class="cs">'+SL[s]+'</div></div><div class="arr">▾</div></div><div class="card-body"></div>';
  const hdr=c.querySelector('.card-hdr');
  hdr.addEventListener('click',(e)=>{
   if(e.target.closest('.st-btn')||e.target.closest('.mic-btn')||e.target.closest('.save-btn')||e.target.tagName==='TEXTAREA')return;
   exp[i]=!exp[i];c.classList.toggle('exp');
  });
  buildBody(c.querySelector('.card-body'),i,h,s,c);g.appendChild(c);
 });
 document.querySelectorAll('.card').forEach((c,i)=>{const s=st.habits[i];if(!s)return;const b=c.querySelector('.card-body');if(!b)return;const btn=b.querySelector('.st-btn[data-st="'+s+'"]');if(btn){btn.className='st-btn s'+s[0];btn.style.borderColor='';btn.style.color='';btn.style.background='';}});
}

function buildBody(body,i,h,s,c){
 const ad=st.actions||{};const notes=(st.notes||{})[i]||[];
 body.innerHTML='<div class="sep"></div><div class="sub-desc">'+h.sd+'</div><div class="al-title">☐ 每日行動清單</div><div class="al">'
 +h.al.map((a,ai)=>{const k=i+'-'+ai;const d=!!ad[k];return '<div class="ai'+(d?' done':'')+'" data-ak="'+k+'"><span class="cb">'+(d?'✓':'')+'</span><span class="at">'+a+'</span></div>';}).join('')
 +'</div><div class="st-toggle"><button class="st-btn" data-si="'+i+'" data-st="green">✅ 已內化</button><button class="st-btn" data-si="'+i+'" data-st="yellow">🔶 可強化</button><button class="st-btn" data-si="'+i+'" data-st="gray">⚪️ 待建立</button></div>'
 +'<div class="ns-title">個人心得筆記</div><div class="voice-row"><textarea placeholder="🎤 按麥克風說話，或打字記錄今天的心得⋯" id="note-ta-'+i+'"></textarea><div class="mic-btn" data-mi="'+i+'"><span class="mic-icon">🎤</span><span class="mic-label">錄音</span></div><div class="save-btn" data-si="'+i+'">💾</div></div>'
 +'<div class="note-history'+(nhOpen[i]?' show':'')+'"><div class="nh-title" data-nh="'+i+'"><span>📋 歷史記錄 ('+notes.length+')</span><span>'+(nhOpen[i]?'▲':'▼')+'</span></div><div class="nh-list"></div></div>'
 +'<div class="tips-title">💡 小提醒</div><div class="tips">'+h.ti+'</div>';

 body.querySelectorAll('.ai').forEach(el=>{el.addEventListener('click',()=>{const k=el.dataset.ak;const ad2=st.actions||{};st.actions=st.actions||{};if(ad2[k]){delete ad2[k];el.classList.remove('done');el.querySelector('.cb').textContent='';}else{ad2[k]=true;el.classList.add('done');el.querySelector('.cb').textContent='✓';}sv();});});
 body.querySelectorAll('.st-btn').forEach(btn=>{btn.addEventListener('click',(e)=>{e.stopPropagation();const nst=btn.dataset.st;const idx=parseInt(btn.dataset.si);st.habits[idx]=nst;c.dataset.s=nst;c.querySelector('.cs').textContent=SL[nst];body.querySelectorAll('.st-btn').forEach(b=>{b.className='st-btn';b.style.borderColor='#2a3140';b.style.color='#4b5563';b.style.background='transparent'});btn.className='st-btn s'+nst[0];btn.style.borderColor='';btn.style.color='';btn.style.background='';uS();sv();});});

 const ta=body.querySelector('textarea');const micBtn=body.querySelector('.mic-btn');const saveBtn=body.querySelector('.save-btn');let recognition=null;let isRecording=false;
 micBtn.addEventListener('click',(e)=>{e.stopPropagation();
  if(isRecording){if(recognition)recognition.stop();micBtn.classList.remove('recording');micBtn.querySelector('.mic-icon').textContent='🎤';micBtn.querySelector('.mic-label').textContent='錄音';isRecording=false;return;}
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){ta.focus();ta.placeholder='瀏覽器不支援語音，請打字⋯';return;}
  recognition=new SR();recognition.lang='zh-TW';recognition.continuous=false;recognition.interimResults=true;
  recognition.onstart=()=>{isRecording=true;micBtn.classList.add('recording');micBtn.querySelector('.mic-icon').textContent='🔴';micBtn.querySelector('.mic-label').textContent='傾聽中';ta.placeholder='🎤 正在聽您說話⋯';};
  recognition.onresult=(event)=>{let t='';for(let i=event.resultIndex;i<event.results.length;i++)t+=event.results[i][0].transcript;ta.value=t;ta.style.height='auto';ta.style.height=ta.scrollHeight+'px';};
  recognition.onerror=(event)=>{micBtn.classList.remove('recording');micBtn.querySelector('.mic-icon').textContent='🎤';micBtn.querySelector('.mic-label').textContent='錄音';isRecording=false;if(event.error==='not-allowed')ta.placeholder='⚠️ 請允許麥克風權限（設定→Safari→麥克風）';else if(event.error==='no-speech')ta.placeholder='🔇 沒聽到聲音，請再試';};
  recognition.onend=()=>{micBtn.classList.remove('recording');micBtn.querySelector('.mic-icon').textContent='🎤';micBtn.querySelector('.mic-label').textContent='錄音';isRecording=false;ta.placeholder=ta.value?'✅ 語音完成！按 💾 儲存':'🎤 按麥克風說話或打字⋯';};
  try{recognition.start();}catch(err){ta.placeholder='⚠️ 語音啟動失敗，請打字';}
 });
 saveBtn.addEventListener('click',(e)=>{e.stopPropagation();const text=ta.value.trim();if(!text)return;if(!st.notes)st.notes={};if(!st.notes[i])st.notes[i]=[];st.notes[i].unshift({date:nowStr(),text:text});ta.value='';ta.style.height='auto';
  const hc=body.querySelector('.note-history');const list=hc.querySelector('.nh-list');
  list.innerHTML='';const allN=st.notes[i];renderNotesList(list,allN);
  hc.querySelector('.nh-title span:first-child').textContent='📋 歷史記錄 ('+allN.length+')';hc.classList.add('show');nhOpen[i]=true;
  sv();showToast('✅ 心得已儲存！');buildWeeklyReport();
 });
 ta.addEventListener('input',()=>{ta.style.height='auto';ta.style.height=ta.scrollHeight+'px';});
 ta.addEventListener('keydown',(e)=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();saveBtn.click();}});
 const nhT=body.querySelector('.nh-title');nhT.addEventListener('click',(e)=>{e.stopPropagation();const idx=parseInt(nhT.dataset.nh);nhOpen[idx]=!nhOpen[idx];body.querySelector('.note-history').classList.toggle('show');nhT.querySelector('span:last-child').textContent=nhOpen[idx]?'▲':'▼';});
 const list=body.querySelector('.nh-list');if(notes.length>0)renderNotesList(list,notes);
}
function renderNotesList(list,notes){if(!notes||notes.length===0){list.innerHTML='<div style="text-align:center;padding:4vw;color:#4b5563;font-size:3.5vw">尚無記錄</div>';return;}list.innerHTML=notes.map(n=>'<div class="nh-item"><div class="nh-date">'+n.date+'</div><div class="nh-text">'+escHtml(n.text)+'</div></div>').join('');}

function rW(){const g=document.getElementById('wg');g.innerHTML='';const k=wk();HH.forEach((h,i)=>{const r=document.createElement('div');r.className='wgr';const l=document.createElement('span');l.className='hl';l.textContent=h.ic+h.t.slice(0,2);r.appendChild(l);for(let d=0;d<7;d++){const c=document.createElement('div');c.className='cl';const y=k+'-'+i+'-'+d;if(st.weekly[y])c.classList.add('d');if(d===di())c.classList.add('t');c.addEventListener('click',()=>{if(st.weekly[y]){delete st.weekly[y];c.classList.remove('d')}else{st.weekly[y]=true;c.classList.add('d')}sv()});r.appendChild(c)}g.appendChild(r)})}

function uS(){const c={green:0,yellow:0,gray:0};st.habits.forEach(s=>c[s]++);document.getElementById('gc').textContent=c.green;document.getElementById('yc').textContent=c.yellow;document.getElementById('xc').textContent=c.gray;document.getElementById('sn').textContent=c.green;const p=c.green/12;const ci=document.getElementById('sc');ci.style.strokeDashoffset=400*(1-p);ci.style.stroke=p>=0.75?'#22e070':p>=0.5?'#facc15':'#f43f5e';}

// ===== WEEKLY REPORT TOGGLE =====
document.getElementById('wrHdr').addEventListener('click',()=>{
 wrOpen=!wrOpen;document.getElementById('wrBanner').classList.toggle('exp');if(wrOpen)buildWeeklyReport();
});
document.getElementById('wrCopyBtn').addEventListener('click',copyWeeklyNotes);

document.getElementById('rb').addEventListener('click',()=>{if(!confirm('確定重設本週？'))return;const k=wk();Object.keys(st.weekly).forEach(y=>{if(y.startsWith(k+'-'))delete st.weekly[y]});rW();sv();showToast('🔄 本週已重設');});
document.getElementById('sb').addEventListener('click',()=>alert('📸 請截圖保存本週進度'));
render();window.addEventListener('beforeunload',sv);
</script></body></html>
